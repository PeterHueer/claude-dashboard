<!DOCTYPE html>
<html data-theme="night" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude AI Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { display: flex; height: 100vh; overflow: hidden; }
    #main { flex: 1; overflow-y: auto; padding-bottom: 220px; transition: margin-right 0.3s ease; }
    #terminal { position: fixed; bottom: 0; left: 240px; right: 0; height: 200px; z-index: 50; transition: right 0.3s ease; }
    #side-panel { position: fixed; top: 0; right: -520px; width: 520px; bottom: 0; z-index: 60; display: flex; flex-direction: column; transition: right 0.3s ease; }
    #side-panel.open { right: 0; }
    body.panel-open #main { margin-right: 520px; }
    body.panel-open #terminal { right: 520px; }
  </style>
</head>
<body class="bg-base-200">

  <!-- Sidebar -->
  <aside class="w-60 bg-base-300 flex flex-col h-full">
    <div class="p-4 text-lg font-bold text-primary">Claude Dashboard</div>
    <ul class="menu flex-1 px-2">
      <li><a onclick="showSection('overview')" id="nav-overview" class="active">Overview</a></li>
      <li><a onclick="showSection('skills')" id="nav-skills">Skills</a></li>
      <li><a onclick="showSection('mcp')" id="nav-mcp">MCP Servers</a></li>
      <li><a onclick="showSection('plugins')" id="nav-plugins">Plugins</a></li>
      <li><a onclick="showSection('agents')" id="nav-agents">Agents</a></li>
    </ul>
    <ul class="menu px-2 pb-2">
      <li><a onclick="showSection('trash')" id="nav-trash" class="text-error opacity-60 hover:opacity-100">Trash</a></li>
    </ul>
    <div class="p-4 text-xs text-base-content opacity-50">v1.0.0 · localhost:3000</div>
  </aside>

  <!-- Main content -->
  <div id="main" class="p-6">
    <div id="section-overview"></div>
    <div id="section-skills" class="hidden"></div>
    <div id="section-mcp" class="hidden"></div>
    <div id="section-plugins" class="hidden"></div>
    <div id="section-agents" class="hidden"></div>
    <div id="section-trash" class="hidden"></div>
  </div>

  <!-- Terminal panel -->
  <div id="terminal" class="bg-base-300 border-t border-base-content border-opacity-20">
    <div class="flex items-center justify-between px-4 py-1 border-b border-base-content border-opacity-10">
      <span class="text-xs font-mono text-success">$ terminal output</span>
      <button onclick="clearTerminal()" class="btn btn-xs btn-ghost">clear</button>
    </div>
    <div id="terminal-output" class="font-mono text-xs p-3 h-36 overflow-y-auto text-base-content opacity-80 whitespace-pre-wrap"></div>
  </div>

  <!-- Side panel -->
  <div id="side-panel" class="bg-base-300 border-l border-base-content border-opacity-20">
    <div class="flex items-center justify-between px-4 py-2 border-b border-base-content border-opacity-10 flex-shrink-0">
      <span id="side-panel-title" class="text-xs font-mono opacity-60 truncate"></span>
      <button onclick="closeSidePanel()" class="btn btn-xs btn-ghost ml-2">✕</button>
    </div>
    <div id="side-panel-content" class="flex-1 overflow-y-auto p-4" style="padding-bottom:220px"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
